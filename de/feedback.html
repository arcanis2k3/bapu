<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BAPU — Feedback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Feedback for BAPU – Share your thoughts and suggestions.">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
  <style>
    .feedback-container {
      max-width: 640px;
      margin: 20px auto;
    }
    #feedback-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .submit-button {
      align-self: flex-start;
      margin-top: 10px;
    }
    #form-status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      display: none;
    }
    #form-status.success {
      display: block !important;
      background: rgba(40, 167, 69, 0.2);
      border: 1px solid #28a745;
      color: #fff;
    }
    #form-status.error {
      display: block !important;
      background: rgba(220, 53, 69, 0.2);
      border: 1px solid #dc3545;
      color: #fff;
    }
  </style>
</head>

<body>

<header>
  <nav>
    <a href="/" class="brand">BAPU</a>
    <div>
      <a href="/" class="nav-link">Home</a>
      <a href="/de/handles.html" class="nav-link">Handles</a>
    </div>
  </nav>
</header>

<main>
  <h1>BAPU Feedback</h1>
  <p>We value your feedback! Please use the form below to share your thoughts, suggestions, or report any issues you've encountered with BAPU.</p>

  <div class="feedback-container">
    <form id="feedback-form">
      <div class="form-group">
        <label for="name">Name (Optional)</label>
        <input type="text" id="name" name="name" placeholder="Your name">
      </div>

      <div class="form-group">
        <label for="email">Email (Optional)</label>
        <input type="email" id="email" name="email" placeholder="your@email.com">
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" name="category">
          <option value="General Feedback">General Feedback</option>
          <option value="Bug Report">Bug Report</option>
          <option value="Feature Request">Feature Request</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required placeholder="Tell us what's on your mind..."></textarea>
      </div>

      <button type="submit" class="submit-button">Send Feedback</button>
    </form>

    <div id="form-status"></div>
  </div>
</main>

<footer>
  <div class="footer-content">
    <p>© 2026 Aureus Z, Inc.</p>
    <p>
      <a href="/">Home</a>
      <a href="/de/handles.html">Handles</a>
      <a href="/de/signup.html">Signup</a>
      <a href="https://zchat.bapu.app" target="_blank">ZChat</a>
      <a href="/de/feedback.html">Feedback</a>
      <a href="/de/privacy.html">Privacy</a>
      <a href="/de/terms.html">Terms</a>
      <a href="/de/sitemap.html">Sitemap</a> <a href="mailto:contact@bapu.app">Contact</a>
    </p>
      <div class="cloudflare-badge">
      <a href="https://www.cloudflare.com/" target="_blank" rel="noopener noreferrer">
        <img src="/cloudflare-badge.png" alt="Protected by Cloudflare" />
      </a>
    </div>
  </div>
</footer>

<script>
  const feedbackForm = document.getElementById('feedback-form');
  const formStatus = document.getElementById('form-status');
  const submitButton = feedbackForm.querySelector('button[type="submit"]');

  feedbackForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const formData = new FormData(feedbackForm);
    const data = Object.fromEntries(formData.entries());

    // Disable form
    submitButton.disabled = true;
    submitButton.textContent = 'Sending...';
    formStatus.style.display = 'none';
    formStatus.className = '';

    try {
      const response = await fetch('https://api.bapu.app/feedback', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(data),
      });

      if (response.ok) {
        feedbackForm.style.display = 'none';
        formStatus.textContent = 'Thank you! Your feedback has been received.';
        formStatus.className = 'success';
      } else {
        throw new Error('Failed to send feedback');
      }
    } catch (error) {
      console.error('Error:', error);
      formStatus.textContent = 'Something went wrong. Please try again later or contact support@bapu.app.';
      formStatus.className = 'error';
      submitButton.disabled = false;
      submitButton.textContent = 'Send Feedback';
    }
  });
</script>

<script src="/status.js" defer></script>
<script src="/js/lang.js" defer></script>
</body>
</html>
