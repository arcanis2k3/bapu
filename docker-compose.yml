services:
  bapu-handle-backend:
    build:
      context: ./backend
    container_name: bapu-handle-backend
    restart: unless-stopped
    network_mode: host
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - BSKY_SERVICE=${BSKY_SERVICE:-https://bsky.social}
      - PORT=3001
      - DATA_DIR=/app/data
    volumes:
      - ./backend_data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
