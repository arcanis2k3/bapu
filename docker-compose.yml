services:
  bapu-handle-backend:
    build:
      context: ./backend
    container_name: bapu-handle-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - BSKY_SERVICE=${BSKY_SERVICE:-https://bsky.social}
      - PORT=3000
      - DATA_DIR=/app/data
    volumes:
      - ./backend_data:/app/data
      # Map the database file specifically if needed,
      # but easier to use a subfolder for all persistent data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

