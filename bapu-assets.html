<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bapu.app — Brand Assets</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Instrument+Serif:ital@0;1&display=swap');

  :root {
    --terracotta: #E07B54;
    --terracotta-deep: #C4603A;
    --terracotta-light: #F0A882;
    --linen: #F5EDE3;
    --linen-warm: #EDE0D0;
    --espresso: #2C1A0E;
    --espresso-mid: #5C3D24;
    --sand: #D4B896;
    --sand-light: #E8D5C0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1008;
    font-family: 'Syne', sans-serif;
    color: var(--linen);
    min-height: 100vh;
    padding: 48px 32px;
  }

  h2 {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--sand);
    margin-bottom: 20px;
    opacity: 0.7;
  }

  .section {
    margin-bottom: 64px;
  }

  /* ─── ICON ─────────────────────────────────────────── */
  .icon-grid {
    display: flex;
    gap: 24px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .icon-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .icon-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--sand);
    opacity: 0.6;
  }

  /* ─── BANNER ────────────────────────────────────────── */
  .banner-wrap {
    border-radius: 16px;
    overflow: hidden;
    display: inline-block;
    max-width: 100%;
  }

  /* ─── DOWNLOAD BUTTONS ──────────────────────────────── */
  .dl-row {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .dl-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid rgba(224,123,84,0.35);
    background: rgba(224,123,84,0.08);
    color: var(--terracotta-light);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
  }

  .dl-btn:hover {
    background: rgba(224,123,84,0.18);
    border-color: var(--terracotta);
  }
</style>
</head>
<body>
